<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 8px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #0c0c0d;
      background: #f9f9fa;
    }
    #container {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #text-display {
      min-height: 60px;
      max-height: 300px;
      padding: 8px;
      border: 1px solid #d7d7db;
      border-radius: 4px;
      background: #fff;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-y: auto;
      line-height: 1.5;
    }
    #text-display.placeholder {
      color: #737373;
      font-family: system-ui, -apple-system, sans-serif;
      font-style: italic;
    }
    #copy-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background: #0060df;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #copy-btn:hover {
      background: #003eaa;
    }
    #copy-btn:active {
      background: #002275;
    }
    #feedback {
      text-align: center;
      font-size: 12px;
      color: #058b00;
      min-height: 18px;
      transition: opacity 0.2s;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="text-display" class="placeholder">(select a node)</div>
    <button id="copy-btn">Copy innerText</button>
    <div id="feedback"></div>
  </div>
  <script src="pane.js"></script>
</body>
</html>
